name: dayscript
description: "A digital diary app called DayScript."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  go_router: ^12.1.1
  google_fonts: ^6.1.0
  equatable: ^2.0.5
  intl: ^0.19.0
  table_calendar: ^3.0.9
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  flutter_staggered_grid_view: ^0.7.0
  pdf: ^3.10.4
  printing: ^5.11.1
  path_provider: ^2.1.1
  share_plus: ^7.1.0
  uuid: ^4.2.0
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.5.6
  google_sign_in: ^6.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
